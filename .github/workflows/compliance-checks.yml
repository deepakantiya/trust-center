name: Compliance Checks

on:
  pull_request:
  push:
    branches: [main]

# Default to least-privilege at the workflow level; jobs override as needed.
permissions:
  contents: read

concurrency:
  group: compliance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-markdown:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules/**

  link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Check links in policies
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-mail --verbose './**/*.md'
          fail: false
        continue-on-error: true

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Run the gitleaks binary directly instead of gitleaks/gitleaks-action@v2.
      # The Action makes outbound API calls for license validation that fail
      # with RequestError on personal accounts and in restricted networks. The
      # binary is identical in detection behavior and exits non-zero on findings.
      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --no-banner \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks.sarif
      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore
          retention-days: 30

  pii-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Block obvious PII patterns in evidence/
        run: python scripts/pii_guard.py

  policy-version-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ensure each policy has a Version and Revision History
        run: python scripts/policy_version_check.py
        continue-on-error: true
