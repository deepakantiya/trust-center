<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email - Trust Center</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --primary: #667eea; --success: #10b981; --error: #ef4444; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #f9fafb; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { max-width: 500px; width: 100%; }
    .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px; text-align: center; }
    .header h1 { color: white; font-size: 24px; }
    .content { padding: 30px; }
    .loading { text-align: center; padding: 40px; }
    .spinner { width: 48px; height: 48px; border: 4px solid #e5e7eb; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-message, .success { text-align: center; }
    .doc-link { display: block; padding: 16px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; text-decoration: none; color: #1f2937; margin-bottom: 12px; }
    .doc-link:hover { border-color: var(--primary); }
    .btn { display: inline-block; padding: 12px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header"><h1>🔐 Trust Center</h1></div>
      <div class="content">
        <div id="loading" class="loading"><div class="spinner"></div><p>Verifying your email...</p></div>
        <div id="error" class="error-message" style="display:none;"><h2 style="color:var(--error)">❌ Verification Failed</h2><p id="error-text"></p><a href="/" class="btn" style="margin-top:20px">Request New Documents</a></div>
        <div id="success" style="display:none;"><h2 style="color:var(--success)">✅ Email Verified!</h2><p>Hello <strong id="user-name"></strong></p><div id="doc-list" style="margin-top:20px;"></div></div>
      </div>
    </div>
  </div>
  <script>
    const SUPABASE_URL = 'https://jdagfmqrlxhiolldecxq.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkYWdmbXFybHhoaW9sbGRlY3hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDEwOTAsImV4cCI6MjA5MzE3NzA5MH0.G58GAn9_jA0nKylGGo1NogF1Gitbtj9hta-O6Zs4OHc'; // Update this
    const STORAGE_BUCKET = 'audit-docs';
    const DOC_LABELS = { soc2: 'SOC 2 Report', iso27001: 'ISO 27001', pentest: 'Pentest Report', cmmc: 'CMMC', dpa: 'DPA', questionnaire: 'Security Questionnaire' };
    const DOC_PATHS = { soc2: 'soc2.pdf', iso27001: 'iso27001.pdf', pentest: 'pentest.pdf', cmmc: 'cmmc.pdf', dpa: 'dpa.pdf', questionnaire: 'questionnaire.pdf' };

    async function verify() {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const success = document.getElementById('success');
      try {
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const hash = new URLSearchParams(window.location.hash.substring(1));
        if (hash.get('access_token')) {
          await supabase.auth.setSession({ access_token: hash.get('access_token'), refresh_token: hash.get('refresh_token') });
          window.history.replaceState(null, '', window.location.pathname + window.location.search);
        }
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) throw new Error('No session. Use the link from your email.');
        const requestId = new URLSearchParams(window.location.search).get('request_id');
        const { data: request } = await supabase.from('document_requests').select('*').eq('id', requestId).eq('email', session.user.email.toLowerCase()).single();
        if (!request) throw new Error('Request not found.');
        const links = [];
        for (const doc of (request.docs || [])) {
          if (DOC_PATHS[doc]) {
            const { data } = await supabase.storage.from(STORAGE_BUCKET).createSignedUrl(DOC_PATHS[doc], 7*24*60*60);
            if (data) links.push({ label: DOC_LABELS[doc], url: data.signedUrl });
          }
        }
        await supabase.from('document_requests').update({ status: 'completed', verified_at: new Date().toISOString(), auth_user_id: session.user.id, links }).eq('id', request.id);
        loading.style.display = 'none';
        success.style.display = 'block';
        document.getElementById('user-name').textContent = request.name;
        document.getElementById('doc-list').innerHTML = links.map(l => `<a href="${l.url}" class="doc-link" target="_blank">📄 ${l.label}</a>`).join('');
      } catch (e) {
        loading.style.display = 'none';
        error.style.display = 'block';
        document.getElementById('error-text').textContent = e.message;
      }
    }
    verify();
  </script>
</body>
</html>
